project:
  name: "3D Pyramid Scaling OpenGL"
  language: "C++"
  library: "OpenGL GLUT"

description: >
  This program draws a 3D pyramid using user-provided base points and a top point.
  The pyramid can be scaled along the X, Y, and Z axes using keyboard input.

inputs:
  base_first_point:
    format: "x1 y1 z1"
    example: "-5 0 -5"
    note: "The first point of the square base"

  base_opposite_point:
    format: "x2 y2 z2"
    example: "5 0 5"
    note: "The opposite point of the square base"

  top_point:
    format: "x y z"
    example: "0 8 0"
    note: "The top or apex point of the pyramid"

  scaling_unit:
    format: "Sx Sy Sz"
    example: "0.2 0.2 0.2"
    note: "The scaling amount applied for each key press along each axis"

keyboard_controls:
  X: "Increase the pyramid scale along the X-axis"
  x: "Decrease the pyramid scale along the X-axis"
  Y: "Increase the pyramid scale along the Y-axis"
  y: "Decrease the pyramid scale along the Y-axis"
  Z: "Increase the pyramid scale along the Z-axis"
  z: "Decrease the pyramid scale along the Z-axis"

sample_input:
  base_first_point: "-5 0 -5"
  base_opposite_point: "5 0 5"
  top_point: "0 8 0"
  scaling_unit: "0.2 0.2 0.2"

output:
  description: "A colored 3D pyramid is displayed in an OpenGL window and scales according to keyboard input."
