project:
  name: "3D Pyramid Translation OpenGL"
  language: "C++"
  library: "OpenGL GLUT"

description: >
  This program draws a 3D pyramid using user-provided base points and a top point.
  The pyramid can be translated along the X, Y, and Z axes using keyboard input.

inputs:
  base_first_point:
    format: "x1 y1 z1"
    example: "-5 0 -5"
    note: "The first point of the square base"

  base_opposite_point:
    format: "x2 y2 z2"
    example: "5 0 5"
    note: "The opposite point of the square base"

  top_point:
    format: "x y z"
    example: "0 8 0"
    note: "The top or apex point of the pyramid"

  translation_unit:
    format: "Tx Ty Tz"
    example: "1 1 1"
    note: "The translation amount applied for each key press along each axis"

keyboard_controls:
  X: "Move the pyramid in the positive X direction"
  x: "Move the pyramid in the negative X direction"
  Y: "Move the pyramid in the positive Y direction"
  y: "Move the pyramid in the negative Y direction"
  Z: "Move the pyramid in the positive Z direction"
  z: "Move the pyramid in the negative Z direction"

sample_input:
  base_first_point: "-5 0 -5"
  base_opposite_point: "5 0 5"
  top_point: "0 8 0"
  translation_unit: "1 1 1"

output:
  description: "A colored 3D pyramid is displayed in an OpenGL window and moves according to keyboard input."
